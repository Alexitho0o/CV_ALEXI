name: Static Site CI

on:
  push:
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List static site files
        run: |
          echo "Repository type: static HTML site"
          echo "docs/ contents:"; ls -la docs || true
          echo "docs/css/ contents:"; ls -la docs/css || true
          echo "js/ contents:"; ls -la js || true

      - name: Quick consistency checks
        run: |
          # Ensure there is an index.html in docs/ (GitHub Pages source)
          if [ -f docs/index.html ]; then
            echo "Index file present"
          else
            echo "WARNING: No docs/index.html found"; exit 1
          fi

