name: Static Site CI

on:
  push:
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List static site files
        run: |
          echo "Repository type: static HTML site"
          echo "html/ contents:"; ls -la html || true
          echo "css/ contents:"; ls -la css || true
          echo "js/ contents:"; ls -la js || true

      - name: Quick consistency checks
        run: |
          # Ensure there is an index.html or html/index.html
          if [ -f index.html ] || [ -f html/index.html ]; then
            echo "Index file present"
          else
            echo "WARNING: No index.html found"; exit 0
          fi

