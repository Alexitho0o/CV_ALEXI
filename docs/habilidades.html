            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCV"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navCV">
                <ul class="navbar-nav ms-auto">

                </ul>

    <div class="container mt-4">
        <div class="hero hero-cyan">
            <h1>🎯 Habilidades</h1>
            <p>Nivel de dominio por categoría</p>
        </div>
    </div>

    <main class="container my-4">
        <div class="card-cv">

            <!-- Data & BI -->
            <h5 class="skill-group-title" style="color:#0891b2;">📊 Data &amp; Business Intelligence</h5>
            <canvas id="dataBIChart"></canvas>

    <script>
        const dataBIChart = new Chart(document.getElementById('dataBIChart'), {
            type: 'bar',
            data: {
                labels: ['Power BI', 'Excel avanzado', 'Python'],
                datasets: [{
                    label: 'Nivel de dominio',
                    data: [90, 95, 75],
                    backgroundColor: ['#0891b2', '#0891b2', '#0891b2']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: true }
                }
            }
        });

        const eduPlatformsChart = new Chart(document.getElementById('eduPlatformsChart'), {
            type: 'bar',
            data: {
                labels: ['Banner', 'Blackboard', 'Moodle'],
                datasets: [{
                    label: 'Nivel de dominio',
                    data: [80, 75, 75],
                    backgroundColor: ['#7c3aed', '#7c3aed', '#7c3aed']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: true }
